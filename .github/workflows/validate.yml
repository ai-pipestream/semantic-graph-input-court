name: Validate (PR)

# PR gate: build the jar + verify the publish wiring is intact. Does NOT publish.
# Generic — works in any <step>-input-court repo unchanged (artifactId derives
# from the repo name via settings.gradle).

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # axion-release needs tags for version resolution
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew build --no-daemon
      - name: Report jar size
        run: |
          JAR=$(ls build/libs/*.jar | grep -vE -- '-sources|-javadoc' | head -1)
          SIZE_MB=$(( $(stat -c%s "$JAR") / 1024 / 1024 ))
          echo "Main jar: $JAR = ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 950 ]; then
            echo "::warning::Jar ${SIZE_MB} MB is within 50 MB of Central Portal's 1 GB limit"
          fi
      - name: Validate publish configuration
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew validatePublish --no-daemon
          ./gradlew tasks --all --no-daemon | grep -E "publishAllPublicationsToCentralPortal\b" || { echo "Missing: CentralPortal"; exit 1; }
          ./gradlew tasks --all --no-daemon | grep -E "publishAllPublicationsToCentralPortalSnapshots\b" || { echo "Missing: CentralPortalSnapshots"; exit 1; }
          echo "Publish wiring OK"
